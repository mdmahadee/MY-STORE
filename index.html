<!-- index.html -->
<!doctype html><meta charset="utf-8">
<body>
  <h2>Store Book</h2>
  <div id="list"></div>
  <script>
    const API = 'https://script.google.com/macros/s/AKfycbxxkqR6Kk1xYR7I_t6HR9Pd6PbX9BPn0_tov9UDwfdVIzet3xDG7V6XO15abVeQWwOW/exec';
    async function load(){ 
      const res = await fetch(API);
      const data = await res.json();
      document.getElementById('list').innerText = JSON.stringify(data, null, 2);
    }
    async function createCustomer(name, phone){
      await fetch(API + '?action=create', {method:'POST', body: JSON.stringify({name, phone, debt:0})});
      load();
    }
    async function changeDebt(id, delta){
      await fetch(API + '?action=updateDebt', {method:'POST', body: JSON.stringify({id, delta})});
      load();
    }
    load();
  </script>
</body>
