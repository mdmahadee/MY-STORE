<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MY STORE</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 0;
  }

  header {
    background-color: #4CAF50;
    color: white;
    padding: 1rem;
    text-align: center;
  }

  main {
    max-width: 900px;
    margin: 2rem auto;
    padding: 1rem;
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  h1 {
    margin-top: 0;
  }

  section {
    margin-bottom: 2rem;
  }

  form {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  input[type="text"], input[type="number"] {
    padding: 0.75rem;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    flex: 1;
  }

  button {
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    border: none;
    border-radius: 4px;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
    transition: background 0.3s;
  }

  button:hover {
    background-color: #45a049;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 0.75rem;
    text-align: left;
    border-bottom: 1px solid #ddd;
  }

  th {
    background-color: #f9f9f9;
  }

  .actions button {
    background-color: #f44336;
  }

  .actions button:hover {
    background-color: #da190b;
  }
</style>
</head>
<body>

<header>
  <h1>MY STORE</h1>
</header>

<main>
  <section>
    <h2>Add / Update Customer</h2>
    <form id="customerForm">
      <input type="text" id="name" placeholder="Customer Name" required />
      <input type="number" id="debt" placeholder="Debt" required />
      <button type="submit">Save</button>
    </form>
  </section>

  <section>
    <h2>Customer List</h2>
    <button onclick="loadCustomers()">Refresh List</button>
    <table id="customerTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Debt</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
</main>

<script>
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbw3XTg91BSoft1ICdvbSpm3GCqvTWedDPTAOsKDiqLN_5CbipAXlQNIFyeiStjowOoK/exec'; // <-- Replace this with your Apps Script URL

  document.getElementById('customerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const debt = parseFloat(document.getElementById('debt').value);
    if (!name || isNaN(debt)) return alert('Please fill all fields correctly.');
    fetch(`${scriptUrl}?action=addOrUpdateCustomer&name=${encodeURIComponent(name)}&debt=${debt}`)
      .then(res => res.text())
      .then(() => {
        loadCustomers();
        document.getElementById('customerForm').reset();
      });
  });

  function loadCustomers() {
    fetch(`${scriptUrl}?action=getCustomers`)
      .then(res => res.json())
      .then(data => {
        const tbody = document.querySelector('#customerTable tbody');
        tbody.innerHTML = '';
        data.forEach(row => {
          if (row[0]) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${row[0]}</td>
              <td>${row[1]}</td>
              <td class="actions">
                <button onclick="deleteCustomer('${row[0]}')">Delete</button>
              </td>`;
            tbody.appendChild(tr);
          }
        });
      });
  }

  function deleteCustomer(name) {
    if (!confirm(\`Are you sure you want to delete \${name}?\`)) return;
    fetch(`${scriptUrl}?action=deleteCustomer&name=${encodeURIComponent(name)}`)
      .then(res => res.text())
      .then(() => loadCustomers());
  }

  // Load customers on page load
  loadCustomers();
</script>

</body>
</html>
